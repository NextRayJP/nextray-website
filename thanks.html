<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>document.documentElement.className+=" js";setTimeout(function(){document.documentElement.className+=" reveal-all"},2000);</script>
<title>送信完了｜NextRay</title>
<meta name="robots" content="noindex" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Manrope:wght@700;800&display=swap" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Manrope:wght@700;800&display=swap" /></noscript>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Noto Sans JP",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;
    background:radial-gradient(60% 60% at 80% 10%,rgba(246,169,74,.15),transparent 60%),
               radial-gradient(60% 60% at 10% 20%,rgba(30,155,255,.18),transparent 60%),#fff;
    color:#0b1220;text-align:center;padding:24px}
  .card{max-width:520px;background:#fff;border:1px solid #e7ecf3;border-radius:24px;padding:56px 40px;
    box-shadow:0 24px 60px -28px rgba(15,40,80,.4)}
  .check{width:82px;height:82px;margin:0 auto 26px;border-radius:50%;
    background:linear-gradient(100deg,#1e9bff,#12d4d0,#f6a94a);display:grid;place-items:center}
  .check svg{width:40px;height:40px;stroke:#fff;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  h1{font-size:1.7rem;font-weight:900;margin-bottom:14px}
  p{color:#6b7688;line-height:1.85;margin-bottom:10px}
  .btn{display:inline-block;margin-top:26px;font-weight:700;color:#fff;text-decoration:none;
    padding:14px 30px;border-radius:999px;background:linear-gradient(100deg,#1e9bff,#12d4d0,#f6a94a);
    box-shadow:0 14px 30px -10px rgba(30,155,255,.55)}
  .tel{margin-top:22px;font-family:"Manrope",sans-serif;font-weight:800;font-size:1.15rem;color:#0b1220}
</style>
</head>
<body>
  <div class="card">
    <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h1>送信が完了しました</h1>
    <p>この度はお問い合わせいただき、誠にありがとうございます。<br />内容を確認のうえ、担当者より折り返しご連絡いたします。</p>
    <p>お急ぎの場合はお電話でもお気軽にどうぞ。</p>
    <div class="tel">📞 080-7517-4514（24時間受付）</div>
    <a class="btn" href="/">トップページへ戻る</a>
  </div>
</body>
</html>
